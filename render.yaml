services:
  - type: web
    name: lumilab
    runtime: node
    # Plan free: sin costo y sin disco persistente propio. Los datos (usuarios, progreso)
    # viven en Turso (base de datos libSQL remota con capa gratuita persistente), así que
    # no se pierden cuando el servicio se reinicia por inactividad.
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "node backend/src/server.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: PORT
        value: 4001
      - key: JWT_SECRET
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
