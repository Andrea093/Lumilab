services:
  - type: web
    name: lumilab
    runtime: node
    # El plan "free" de Render NO admite disco persistente: los datos (usuarios, progreso)
    # se perderían cada vez que el servicio se reinicia por inactividad. Para conservar
    # los datos de verdad se necesita un plan pago (ej. "starter") con el disco de abajo.
    plan: starter
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "node backend/src/server.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: PORT
        value: 4001
      - key: DB_PATH
        value: /var/data/lumilab.db
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: lumilab-data
      mountPath: /var/data
      sizeGB: 1
